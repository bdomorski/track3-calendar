<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track 3 Days Off — 2026–2027</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffdf7;
    --ink: #1a1410;
    --muted: #7a6f62;
    --accent: #d4471b;
    --holiday: #d4471b;
    --vacation: #6b4fc8;
    --teacher: #1e7a5e;
    --first-last: #c87d1e;
    --border: #e0d8cc;
    --tag-bg: rgba(212,71,27,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeUp 0.6s ease both;
  }

  header .school {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 7vw, 52px);
    font-weight: 700;
    line-height: 1.1;
    color: var(--ink);
  }

  header h1 span { color: var(--accent); }

  header .subtitle {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Filter tabs */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.18s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .stat-box {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    text-align: center;
    min-width: 80px;
  }

  .stat-box .num {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-box .label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Month grid */
  .months-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    max-width: 1000px;
    margin: 0 auto 40px;
  }

  .month-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    animation: fadeUp 0.5s ease both;
  }

  .month-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .month-title .year-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .day-header {
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 0;
  }

  .day-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: default;
    position: relative;
    transition: transform 0.12s;
  }

  .day-cell.empty { background: transparent; }
  .day-cell.school { color: var(--ink); }
  .day-cell.weekend { color: #ccc; }
  .day-cell.filtered-out { color: transparent; background: transparent; }

  .day-cell.holiday {
    background: var(--holiday);
    color: #fff;
    font-weight: 700;
  }
  .day-cell.vacation {
    background: var(--vacation);
    color: #fff;
    font-weight: 700;
  }
  .day-cell.teacher-day {
    background: var(--teacher);
    color: #fff;
    font-weight: 700;
  }
  .day-cell.first-last {
    background: var(--first-last);
    color: #fff;
    font-weight: 700;
  }

  .day-cell.off:hover {
    transform: scale(1.15);
    z-index: 10;
  }

  /* Tooltip */
  .day-cell[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 5px;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
  }

  /* Timeline list view */
  .timeline {
    max-width: 640px;
    margin: 0 auto;
  }

  .timeline-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.4s ease both;
  }

  .timeline-date {
    flex-shrink: 0;
    width: 90px;
    text-align: right;
  }

  .timeline-date .month-abbr {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .timeline-date .day-num {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
  }

  .timeline-line {
    flex-shrink: 0;
    width: 2px;
    background: var(--border);
    align-self: stretch;
    margin-top: 4px;
    border-radius: 2px;
  }

  .timeline-info {}

  .timeline-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .tag-holiday { background: rgba(212,71,27,0.12); color: var(--holiday); }
  .tag-vacation { background: rgba(107,79,200,0.12); color: var(--vacation); }
  .tag-teacher { background: rgba(30,122,94,0.12); color: var(--teacher); }
  .tag-first-last { background: rgba(200,125,30,0.12); color: var(--first-last); }

  .timeline-desc {
    font-size: 14px;
    color: var(--ink);
    margin-top: 2px;
  }

  .timeline-range {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* View toggle */
  .view-toggle {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .view-btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.18s;
  }
  .view-btn.active { background: var(--ink); border-color: var(--ink); color: #fff; }

  .view-section { display: none; }
  .view-section.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="school">Wake County Public Schools · Track 3</div>
  <h1>Days <span>Off</span><br>2026–2027</h1>
  <div class="subtitle">Holidays · Vacations · Teacher Workdays</div>
</header>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background:var(--holiday)"></div> Holiday</div>
  <div class="legend-item"><div class="dot" style="background:var(--vacation)"></div> Track-Out</div>
  <div class="legend-item"><div class="dot" style="background:var(--teacher)"></div> Teacher Workday</div>
  <div class="legend-item"><div class="dot" style="background:var(--first-last)"></div> First/Last Day</div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="holiday">Holidays</button>
  <button class="filter-btn" data-filter="vacation">Track-Out</button>
  <button class="filter-btn" data-filter="teacher-day">Teacher Days</button>
</div>

<div class="stats">
  <div class="stat-box">
    <div class="num" id="stat-holiday" style="color:var(--holiday)">—</div>
    <div class="label">Holidays</div>
  </div>
  <div class="stat-box">
    <div class="num" id="stat-vacation" style="color:var(--vacation)">—</div>
    <div class="label">Track-Out Days</div>
  </div>
  <div class="stat-box">
    <div class="num" id="stat-teacher" style="color:var(--teacher)">—</div>
    <div class="label">Teacher Days</div>
  </div>
  <div class="stat-box">
    <div class="num" id="stat-total" style="color:var(--accent)">—</div>
    <div class="label">Total Days Off</div>
  </div>
</div>

<div class="view-toggle">
  <button class="view-btn active" data-view="calendar">📅 Calendar</button>
  <button class="view-btn" data-view="list">📋 List</button>
</div>

<div id="view-calendar" class="view-section visible">
  <div class="months-grid" id="months-grid"></div>
</div>

<div id="view-list" class="view-section">
  <div class="timeline" id="timeline"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

  { date: '2026-09-07', type: 'H', label: 'Labor Day' },

  { date: '2026-10-26', type: 'V', label: 'Track-Out' },
  { date: '2026-10-27', type: 'V', label: 'Track-Out' },
  { date: '2026-10-28', type: 'V', label: 'Track-Out' },
  { date: '2026-10-29', type: 'V', label: 'Track-Out' },
  { date: '2026-10-30', type: 'V', label: 'Track-Out' },

  // ── NOVEMBER 2026 ── Track-Out 2 continued
  { date: '2026-11-02', type: 'V', label: 'Track-Out' },
  { date: '2026-11-03', type: 'V', label: 'Track-Out' },
  { date: '2026-11-04', type: 'V', label: 'Track-Out' },
  { date: '2026-11-05', type: 'V', label: 'Track-Out' },
  { date: '2026-11-06', type: 'V', label: 'Track-Out' },
  { date: '2026-11-09', type: 'V', label: 'Track-Out' },         // T Mon
  { date: '2026-11-10', type: 'T', label: 'Teacher Workday' },   // W Tue
  { date: '2026-11-11', type: 'H', label: 'Veterans Day' },      // H Wed
  { date: '2026-11-12', type: 'T', label: 'Teacher Workday' },   // W Thu
  { date: '2026-11-13', type: 'T', label: 'Teacher Workday' },   // W Fri
  { date: '2026-11-25', type: 'V', label: 'Track-Out' },         // A Wed
  { date: '2026-11-26', type: 'H', label: 'Thanksgiving' },      // H Thu
  { date: '2026-11-27', type: 'H', label: 'Thanksgiving' },      // H Fri

  // ── DECEMBER 2026 ── Winter Break
  { date: '2026-12-21', type: 'V', label: 'Winter Break' },      // A Mon
  { date: '2026-12-22', type: 'V', label: 'Winter Break' },      // A Tue
  { date: '2026-12-23', type: 'V', label: 'Winter Break' },      // A Wed
  { date: '2026-12-24', type: 'H', label: 'Christmas Eve' },     // H Thu
  { date: '2026-12-25', type: 'H', label: 'Christmas Day' },     // H Fri
  { date: '2026-12-28', type: 'H', label: 'Winter Break' },      // H Mon
  { date: '2026-12-29', type: 'V', label: 'Winter Break' },      // A Tue

  // ── JANUARY 2027 ── Track-Out 3
  { date: '2027-01-01', type: 'H', label: "New Year's Day" },    // H Fri
  { date: '2027-01-04', type: 'V', label: 'Track-Out' },
  { date: '2027-01-05', type: 'V', label: 'Track-Out' },

  { date: '2027-02-01', type: 'V', label: 'Track-Out' },
  { date: '2027-02-02', type: 'V', label: 'Track-Out' },

  // ── MAY 2027 ──
  { date: '2027-05-03', type: 'V', label: 'Track-Out' },         // T Mon

  { date: '2027-05-07', type: 'T', label: 'Teacher Workday' },   // W Fri
  { date: '2027-05-31', type: 'H', label: 'Memorial Day' },

  { date: '2027-06-29', type: 'T', label: 'Teacher Workday' },   // W Tue
  { date: '2027-06-30', type: 'T', label: 'Teacher Workday' },   // W Wed
];

const offMap = {};
offDays.forEach(d => { offMap[d.date] = d; });

// Months to display
const months = [
  { year: 2026, month: 6, label: 'July 2026' },
  { year: 2026, month: 7, label: 'August 2026' },
  { year: 2026, month: 8, label: 'September 2026' },
  { year: 2026, month: 9, label: 'October 2026' },
  { year: 2026, month: 10, label: 'November 2026' },
  { year: 2026, month: 11, label: 'December 2026' },
  { year: 2027, month: 0, label: 'January 2027' },
  { year: 2027, month: 1, label: 'February 2027' },
  { year: 2027, month: 2, label: 'March 2027' },
  { year: 2027, month: 3, label: 'April 2027' },
  { year: 2027, month: 4, label: 'May 2027' },
  { year: 2027, month: 5, label: 'June 2027' },
];

const typeClass = { H: 'holiday', V: 'vacation', T: 'teacher-day', F: 'first-last' };
const typeLabel = { H: 'Holiday', V: 'Vacation', T: 'Teacher Day', F: 'School Day' };

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

let activeFilter = 'all';

function matchesFilter(type) {
  if (activeFilter === 'all') return true;
  return typeClass[type] === activeFilter;
}

// ─── CALENDAR VIEW ────────────────────────────────────────────────────────────
function renderCalendar() {
  const grid = document.getElementById('months-grid');
  grid.innerHTML = '';

  months.forEach((m, idx) => {
    // Always render all 12 months regardless of filter

    const firstDay = new Date(m.year, m.month, 1).getDay();
    const daysInMonth = new Date(m.year, m.month + 1, 0).getDate();

    const card = document.createElement('div');
    card.className = 'month-card';
    card.style.animationDelay = `${idx * 0.05}s`;

    const title = document.createElement('div');
    title.className = 'month-title';
    title.innerHTML = `<span>${m.label.split(' ')[0]}</span><span class="year-tag">${m.label.split(' ')[1]}</span>`;
    card.appendChild(title);

    const calGrid = document.createElement('div');
    calGrid.className = 'cal-grid';

    DAYS.forEach(d => {
      const h = document.createElement('div');
      h.className = 'day-header';
      h.textContent = d[0];
      calGrid.appendChild(h);
    });

    // Empty offset cells
    for (let i = 0; i < firstDay; i++) {
      const e = document.createElement('div');
      e.className = 'day-cell empty';
      calGrid.appendChild(e);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const key = dateKey(m.year, m.month, d);
      const dow = new Date(m.year, m.month, d).getDay();
      const isWeekend = dow === 0 || dow === 6;
      const off = offMap[key];

      if (activeFilter === 'all') {
        // Show everything normally
        if (off) {
          const cls = typeClass[off.type];
          cell.className = `day-cell ${cls} off`;
          cell.setAttribute('data-tip', off.label);
        } else if (isWeekend) {
          cell.className = 'day-cell weekend';
        } else {
          cell.className = 'day-cell school';
        }
        cell.textContent = d;
      } else {
        // Filtering: only show matching colored days — everything else invisible (no number)
        if (off && matchesFilter(off.type)) {
          const cls = typeClass[off.type];
          cell.className = `day-cell ${cls} off`;
          cell.setAttribute('data-tip', off.label);
          cell.textContent = d;
        } else {
          cell.className = 'day-cell filtered-out';
          // No text = completely invisible, just holds grid position
        }
      }

      calGrid.appendChild(cell);
    }

    card.appendChild(calGrid);
    grid.appendChild(card);
  });
}

// ─── TIMELINE VIEW ───────────────────────────────────────────────────────────
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  // Group consecutive same-type same-label days
  const sorted = [...offDays].sort((a,b) => a.date.localeCompare(b.date));
  const groups = [];
  let cur = null;

  sorted.forEach(d => {
    if (!matchesFilter(d.type)) return;
    if (cur && cur.label === d.label && cur.type === d.type &&
        isConsecutive(cur.end, d.date)) {
      cur.end = d.date;
    } else {
      cur = { ...d, start: d.date, end: d.date };
      groups.push(cur);
    }
  });

  if (groups.length === 0) {
    tl.innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px 0;">No results for this filter.</p>';
    return;
  }

  groups.forEach((g, i) => {
    const startDate = new Date(g.start + 'T12:00:00');
    const endDate = new Date(g.end + 'T12:00:00');
    const multiDay = g.start !== g.end;

    const item = document.createElement('div');
    item.className = 'timeline-item';
    item.style.animationDelay = `${i * 0.03}s`;

    const cls = typeClass[g.type];
    const tagCls = `tag-${cls}`;

    const rangeStr = multiDay
      ? `${MONTH_FULL[startDate.getMonth()]} ${startDate.getDate()} – ${MONTH_FULL[endDate.getMonth()]} ${endDate.getDate()}`
      : '';

    item.innerHTML = `
      <div class="timeline-date">
        <div class="month-abbr">${MONTH_NAMES[startDate.getMonth()]} ${startDate.getFullYear()}</div>
        <div class="day-num" style="color:var(--${cls === 'teacher-day' ? 'teacher' : cls === 'first-last' ? 'first-last' : cls})">${startDate.getDate()}${multiDay ? '–' + endDate.getDate() : ''}</div>
      </div>
      <div class="timeline-line"></div>
      <div class="timeline-info">
        <span class="timeline-tag ${tagCls}">${typeLabel[g.type]}</span>
        <div class="timeline-desc">${g.label}</div>
        ${multiDay ? `<div class="timeline-range">${rangeStr}</div>` : ''}
      </div>`;

    tl.appendChild(item);
  });
}

function isConsecutive(dateStr1, dateStr2) {
  const d1 = new Date(dateStr1 + 'T12:00:00');
  const d2 = new Date(dateStr2 + 'T12:00:00');
  let next = new Date(d1);
  next.setDate(next.getDate() + 1);
  // Skip weekends
  while (next.getDay() === 0 || next.getDay() === 6) next.setDate(next.getDate() + 1);
  return next.toDateString() === d2.toDateString() || d2.toDateString() === new Date(d1.getTime() + 86400000).toDateString();
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  const h = offDays.filter(d => d.type === 'H').length;
  const v = offDays.filter(d => d.type === 'V').length;
  const t = offDays.filter(d => d.type === 'T').length;
  document.getElementById('stat-holiday').textContent = h;
  document.getElementById('stat-vacation').textContent = v;
  document.getElementById('stat-teacher').textContent = t;
  document.getElementById('stat-total').textContent = h + v + t;
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCalendar();
    renderTimeline();
  });
});

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('visible'));
    document.getElementById(`view-${btn.dataset.view}`).classList.add('visible');
  });
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateStats();
renderCalendar();
renderTimeline();
</script>
